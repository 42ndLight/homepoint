
services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: homepoint-db-prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    # Don't expose port - only accessible from within Docker network
    env_file:
     - .env.prod
    networks:
      - homepoint_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Django Backend API
  backend:
    image: homepoint-backend:prod
    container_name: homepoint-backend-prod
    env_file:
      - .env.prod
    
    volumes:
      - static_volume_prod:/app/staticfiles_collected
      - media_volume_prod:/app/media
    
    # Don't expose port - only accessible through nginx
    networks:
      - homepoint_network
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: always
    
    # Optimized production command
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn homepointBackend.wsgi:application 
          --bind 0.0.0.0:8000 
          --workers 4 
          --worker-class sync
          --timeout 120
          --access-logfile -
          --error-logfile -
      "


  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: homepoint-nginx-prod
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - static_volume_prod:/app/staticfiles_collected:ro
      - media_volume_prod:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - homepoint_network
    depends_on:
      - backend
    restart: always

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: homepoint-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  redis:
    image: redis:7-alpine
    container_name: homepoint-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - homepoint_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery:
    build:
      context: ./homepointBackend
      dockerfile: Dockerfile
    container_name: homepoint-celery
    command: celery -A homepointBackend worker -l info --concurrency=4
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./homepointBackend:/app
    networks:
      - homepoint_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build:
      context: ./homepointBackend
      dockerfile: Dockerfile
    container_name: homepoint-celery-beat
    command: celery -A homepointBackend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./homepointBackend:/app
    networks:
      - homepoint_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data_prod:
    driver: local
  static_volume_prod:
    driver: local
  media_volume_prod:
    driver: local
  redis_data:
    driver: local

networks:
  homepoint_network:
    driver: bridge
