
services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: homepoint-db-prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    # Don't expose port - only accessible from within Docker network
    env_file:
     - .env.prod
    networks:
      - homepoint_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Django Backend API
  backend:
    image: ${DOCKER_REGISTRY}/light/pos-backend:${VERSION:-latest}
    container_name: homepoint-backend-prod
    env_file:
      - .env.prod
    
    volumes:
      - static_volume_prod:/app/staticfiles_collected
      - media_volume_prod:/app/media
    
    # Don't expose port - only accessible through nginx
    networks:
      - homepoint_network
    
    depends_on:
      db:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: always
    
    # Optimized production command
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn homepointBackend.wsgi:application 
          --bind 0.0.0.0:8000 
          --workers 4 
          --worker-class sync
          --timeout 120
          --access-logfile -
          --error-logfile -
      "

  # Vue.js Frontend (pre-built)
  frontend:
    image: ${DOCKER_REGISTRY}/light/pos-frontend:${VERSION:-latest}
    container_name: homepoint-frontend-prod
    env_file:
      - .env.prod
    
    # Don't expose port - only accessible through nginx
    networks:
      - homepoint_network
    
    depends_on:
      - backend
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    restart: always

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: homepoint-nginx-prod
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Mount SSL certificates
      - static_volume_prod:/app/staticfiles_collected:ro
      - media_volume_prod:/app/media:ro
    
    ports:
      - "80:80"
      - "443:443"
    
    networks:
      - homepoint_network
    
    depends_on:
      - frontend
      - backend
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    restart: always

volumes:
  postgres_data_prod:
    driver: local
  static_volume_prod:
    driver: local
  media_volume_prod:
    driver: local

networks:
  homepoint_network:
    driver: bridge
