services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: homepoint-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d 
    env_file:
     - .env
    ports:
      - "5433:${DB_PORT}"
    networks:
      - homepoint_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Django Backend API
  backend:
    build:
      context: ./homepointBackend
      dockerfile: Dockerfile
    container_name: homepoint-backend
    env_file:
      - .env
    
    volumes:
      - ./homepointBackend:/app
      - static_volume:/app/staticfiles_collected
      - shared_media:/app/media
    
    ports:
      - "8000:8000"
    
    networks:
      - homepoint_network
    
    depends_on:
      db:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    
    command: >
      sh -c "
        python manage.py wait_for_db &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn homepointBackend.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
      "

  # Vue.js Frontend
  frontend:
    build:
      context: ./homepointFrontend
      dockerfile: Dockerfile
    container_name: homepoint-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_STORE_NAME: ${VITE_STORE_NAME:-Homepoint POS}
      VITE_STORE_TIN: ${VITE_STORE_TIN:-}
      VITE_STORE_ADDRESS: ${VITE_STORE_ADDRESS:-}
      VITE_STORE_PHONE: ${VITE_STORE_PHONE:-}
      NODE_ENV: ${NODE_ENV:-production}
    
    ports:
      - "5173:8080"
    
    networks:
      - homepoint_network
    
    depends_on:
      - backend
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    restart: unless-stopped

  # Optional: Nginx Reverse Proxy (uncomment to use)
  nginx:
    image: nginx:alpine
    container_name: homepoint-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles_collected
      - shared_media:/app/media
    ports:
      - "80:80"
      - "443:443"
    networks:
      - homepoint_network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: homepoint-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - homepoint_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery:
    build:
      context: ./homepointBackend
      dockerfile: Dockerfile
    container_name: homepoint-celery
    command: celery -A homepointBackend worker -l info --concurrency=4
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./homepointBackend:/app
      - shared_media:/app/media
    networks:
      - homepoint_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build:
      context: ./homepointBackend
      dockerfile: Dockerfile
    container_name: homepoint-celery-beat
    command: celery -A homepointBackend beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./homepointBackend:/app
      - shared_media:/app/media
    networks:
      - homepoint_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  shared_media:
    driver: local
  redis_data:
    driver: local

networks:
  homepoint_network:
    driver: bridge
