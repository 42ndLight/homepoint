name: Deploy to AWS

on:
  push:
    branches: [ prod-cloud ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_BACKEND_REPO: light42/pos-backend
  ECR_FRONTEND_REPO: light42/pos-frontend
  S3_BUCKET: s3-pos-public-host
  # Default API URL if secret is not set
  VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://test.betasys.co.ke/api' }}
  VITE_STORE_NAME: HOMEPOINT HARDWARE STORE
  VITE_STORE_TIN: 118184471
  VITE_STORE_ADDRESS: Nairobi, Kenya
  VITE_STORE_PHONE: +254 700 000000


jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: './homepointFrontend/package-lock.json'

    - name: Install & Build Frontend
      run: |
        npm ci
        npm run build
      working-directory: ./homepointFrontend
      env:
        VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Deploy to S3
      run: |
        aws s3 sync ./homepointFrontend/dist s3://${{ env.S3_BUCKET }} --delete

    - name: Invalidate CloudFront Cache
      run: |
        aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} --paths "/*"

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Ensure ECR Repositories Exist
      run: |
        for repo in ${{ env.ECR_BACKEND_REPO }} ${{ env.ECR_FRONTEND_REPO }}; do
          aws ecr describe-repositories --repository-names $repo || aws ecr create-repository --repository-name $repo
        done

    - name: Build, Tag, and Push Backend Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:$IMAGE_TAG \
                     -t $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }}:latest ./homepointBackend
        docker push $ECR_REGISTRY/${{ env.ECR_BACKEND_REPO }} --all-tags

    - name: Build, Tag, and Push Frontend Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build --build-arg VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }} \
                     -t $ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:$IMAGE_TAG \
                     -t $ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }}:latest ./homepointFrontend
        docker push $ECR_REGISTRY/${{ env.ECR_FRONTEND_REPO }} --all-tags
